name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

      # redis:
      #   image: redis
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libpq-dev libyaml-dev pkg-config google-chrome-stable

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/career_intelligence_test
          # REDIS_URL: redis://localhost:6379/0
        run: |
          bin/rails db:create db:schema:load
          bin/rails tailwindcss:build
          bundle exec rspec

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [scan_ruby, scan_js, lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: career_intelligence
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          DATABASE_PASSWORD: ${{ secrets.PRODUCTION_DATABASE_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          APPSIGNAL_PUSH_API_KEY: ${{ secrets.APPSIGNAL_PUSH_API_KEY }}
          HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}
          APPSIGNAL_APP_ENV: ${{ vars.APPSIGNAL_APP_ENV }}
          APPSIGNAL_APP_NAME: ${{ vars.APPSIGNAL_APP_NAME }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT }}
        run: |
          # Build deploy script via Python (avoids all shell/sed quoting issues)
          ENCODED=$(python3 << 'PYEOF'
          import os, base64

          ecr = os.environ["ECR_REGISTRY"]
          key = os.environ["RAILS_MASTER_KEY"]
          pw = os.environ["DATABASE_PASSWORD"]
          sentry_dsn = os.environ["SENTRY_DSN"]
          sentry_environment = os.environ["SENTRY_ENVIRONMENT"]
          appsignal_push_api_key = os.environ["APPSIGNAL_PUSH_API_KEY"]
          appsignal_app_name = os.environ["APPSIGNAL_APP_NAME"]
          appsignal_app_env = os.environ["APPSIGNAL_APP_ENV"]
          honeybadger_api_key = os.environ["HONEYBADGER_API_KEY"]

          env_lines = [
              "RAILS_ENV=production",
              "RAILS_MASTER_KEY=" + key,
              "DATABASE_NAME=career_intelligence_production",
              "DATABASE_HOST=career-intel-db.ctdpbp3ytlgz.us-east-1.rds.amazonaws.com",
              "DATABASE_PORT=5432",
              "DATABASE_USER=career_intel",
              "DATABASE_PASSWORD=" + pw,
              "PGSSLMODE=require",
              "SENTRY_DSN=" + sentry_dsn,
              "SENTRY_ENVIRONMENT=" + sentry_environment,
              "APPSIGNAL_PUSH_API_KEY=" + appsignal_push_api_key,
              "APPSIGNAL_APP_NAME=" + appsignal_app_name,
              "APPSIGNAL_APP_ENV=" + appsignal_app_env,
              "HONEYBADGER_API_KEY=" + honeybadger_api_key,
          ]

          script_lines = [
              "#!/bin/bash",
              "set -e",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin " + ecr,
              "docker system prune -af",
              "docker pull " + ecr + "/career_intelligence:latest",
              "docker stop career_intelligence 2>/dev/null || true",
              "docker rm career_intelligence 2>/dev/null || true",
              "cat > /tmp/deploy.env << 'ENVEOF'",
          ] + env_lines + [
              "ENVEOF",
              "docker run -d --name career_intelligence --restart unless-stopped -p 80:80 --env-file /tmp/deploy.env " + ecr + "/career_intelligence:latest",
              "sleep 5",
              "docker ps | grep career_intelligence",
              "rm -f /tmp/deploy.env",
              "echo Deployment complete!",
          ]

          script = "\n".join(script_lines) + "\n"
          print(base64.b64encode(script.encode()).decode())
          PYEOF
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"echo $ENCODED | base64 -d > /tmp/deploy.sh && bash /tmp/deploy.sh && rm -f /tmp/deploy.sh\"]}" \
            --region us-east-1 \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region us-east-1 \
              --query 'Status' \
              --output text 2>/dev/null || echo "InProgress")

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region us-east-1 \
                --query 'StandardOutputContent' \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region us-east-1 \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi

            echo "Waiting... ($STATUS)"
            sleep 10
          done

          echo "Timed out waiting for deployment"
          exit 1
